services:
  mysql:
    build: ./db-mysql80
    container_name: dev-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-dev}
      - MYSQL_USER=${MYSQL_USER:-dev}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-dev}
    volumes:
      - /Users/cloudswhite/Personal/SoftwareData/docker/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    build: ./db-postgresql
    container_name: dev-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    volumes:
      - /Users/cloudswhite/Personal/SoftwareData/docker/postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nacos:
    build: ./nacos
    container_name: dev-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"     # API Server
      - "8080:8080"     # Console 管理控制台
      - "9848:9848"     # gRPC 客户端
      - "9849:9849"     # gRPC 服务端内部通信
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
      - NACOS_AUTH_TOKEN=lVKBC8aoaFOZ4pY8TDeyl7C4td3J0V8SjVc7R+Wm3/Y=
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security
    volumes:
      - /Users/cloudswhite/Personal/SoftwareData/docker/nacos/data:/home/nacos/data
      - /Users/cloudswhite/Personal/SoftwareData/docker/nacos/logs:/home/nacos/logs
      - ./nacos/conf/custom.properties:/home/nacos/conf/application.properties
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
